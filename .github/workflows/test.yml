name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # TODO: Re-enable typecheck once intelligence module TS errors fixed
      # - name: Type check
      #   run: npm run typecheck

      # TODO: Re-enable lint once ESLint flat config fixed
      # - name: Lint
      #   run: npm run lint

      - name: Test
        run: npm test
